<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Academic Editor PoC</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, #f9edd8, transparent 28%),
          linear-gradient(180deg, #fffdf8 0%, #eef3f8 100%);
        color: #1f2933;
      }

      main {
        max-width: 860px;
        margin: 40px auto;
        padding: 32px;
      }

      .shell {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 20px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
      }

      p {
        margin: 0;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 24px 0 16px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(135deg, #1f6feb, #0ea5a8);
        transition:
          transform 140ms ease,
          box-shadow 140ms ease,
          opacity 140ms ease;
        box-shadow: 0 12px 24px rgba(31, 111, 235, 0.2);
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.55;
        cursor: wait;
        transform: none;
        box-shadow: none;
      }

      .secondary {
        background: #dfe8f1;
        color: #15314b;
        box-shadow: none;
      }

      .meta {
        margin-top: 10px;
        color: #52606d;
      }

      .message {
        min-height: 24px;
        margin: 12px 0 0;
        color: #166534;
        font-size: 0.95rem;
      }

      textarea {
        width: 100%;
        min-height: 280px;
        margin-top: 20px;
        padding: 18px;
        border: 1px solid #d7e2ee;
        border-radius: 16px;
        font: inherit;
        font-size: 1rem;
        line-height: 1.6;
        resize: vertical;
        background: #fcfdff;
      }

      .ai-panel {
        display: none;
        margin-top: 20px;
        padding: 20px;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(14, 165, 168, 0.08), rgba(31, 111, 235, 0.08));
        border: 1px solid rgba(31, 111, 235, 0.14);
      }

      .ai-panel h2 {
        margin: 0 0 8px;
      }

      .ai-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      @media (max-width: 640px) {
        main {
          padding: 18px;
        }

        .shell {
          padding: 20px;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="shell">
        <h1>Document Editor</h1>
        <p>Minimal PoC proving the frontend can call the document and AI API contracts.</p>
        <p id="doc-meta" class="meta">No document loaded.</p>

        <div class="toolbar">
          <button type="button" onclick="createDoc()">Create New Document</button>
          <button type="button" onclick="saveDoc()">Save Current</button>
          <button id="ai-button" type="button" onclick="invokeAI()">AI Summarize Selected Text</button>
        </div>

        <p id="message" class="message"></p>

        <textarea
          id="editor"
          placeholder="Start typing your academic paper here..."
        ></textarea>

        <section id="ai-panel" class="ai-panel">
          <h2>AI Suggestion Preview</h2>
          <p id="ai-result"></p>
          <div class="ai-actions">
            <button type="button" onclick="acceptAI()">Accept &amp; Replace</button>
            <button
              type="button"
              class="secondary"
              onclick="hideAiPanel()"
            >
              Reject
            </button>
          </div>
        </section>
      </section>
    </main>

    <script>
      const API_URL = "http://localhost:3000";
      let currentDocId = null;
      let lastAiSuggestion = "";
      let lastSelectionRange = null;

      async function createDoc() {
        try {
          const response = await fetch(`${API_URL}/documents`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              title: "My Research Paper",
              content: "Initial draft..."
            })
          });
          const data = await response.json();

          currentDocId = data.document_id;
          document.getElementById("editor").value = data.current_content;
          document.getElementById("doc-meta").innerText =
            `Active Document ID: ${currentDocId}`;
          msg("Document created successfully.");
        } catch (error) {
          msg("Unable to create document.");
          console.error(error);
        }
      }

      async function saveDoc() {
        if (!currentDocId) {
          msg("Create a document first.");
          return;
        }

        try {
          const content = document.getElementById("editor").value;
          const response = await fetch(`${API_URL}/documents/${currentDocId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content })
          });

          if (!response.ok) {
            throw new Error("Save failed");
          }

          msg("Document saved to backend.");
        } catch (error) {
          msg("Unable to save document.");
          console.error(error);
        }
      }

      async function invokeAI() {
        if (!currentDocId) {
          msg("Create a document first.");
          return;
        }

        const textarea = document.getElementById("editor");
        const selectedText = textarea.value.substring(
          textarea.selectionStart,
          textarea.selectionEnd
        );

        if (!selectedText) {
          msg("Please highlight some text first.");
          return;
        }

        lastSelectionRange = {
          start: textarea.selectionStart,
          end: textarea.selectionEnd
        };

        setAiLoading(true);
        msg("Asking AI to summarize...");

        try {
          const response = await fetch(
            `${API_URL}/documents/${currentDocId}/ai/summarize`,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ selected_text: selectedText })
            }
          );
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "AI request failed");
          }

          lastAiSuggestion = data.ai_response;
          document.getElementById("ai-result").innerText = lastAiSuggestion;
          document.getElementById("ai-panel").style.display = "block";
          msg("AI responded.");
        } catch (error) {
          msg(error.message || "AI request failed.");
          console.error(error);
        } finally {
          setAiLoading(false);
        }
      }

      function acceptAI() {
        const textarea = document.getElementById("editor");

        if (!lastSelectionRange) {
          msg("Run AI on a text selection first.");
          return;
        }

        const { start, end } = lastSelectionRange;
        const text = textarea.value;

        textarea.value =
          text.substring(0, start) +
          lastAiSuggestion +
          text.substring(end);
        textarea.focus();
        textarea.setSelectionRange(
          start,
          start + lastAiSuggestion.length
        );
        hideAiPanel();
        msg("AI suggestion applied. Don't forget to save.");
      }

      function hideAiPanel() {
        document.getElementById("ai-panel").style.display = "none";
      }

      function setAiLoading(isLoading) {
        document.getElementById("ai-button").disabled = isLoading;
      }

      function msg(text) {
        const messageNode = document.getElementById("message");
        messageNode.innerText = text;
        clearTimeout(msg.timeoutId);
        msg.timeoutId = setTimeout(() => {
          messageNode.innerText = "";
        }, 3000);
      }
    </script>
  </body>
</html>
